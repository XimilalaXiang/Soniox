name: Build and Push Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/ximilalaxiang/opensoniox-frontend
  BACKEND_IMAGE: ghcr.io/ximilalaxiang/opensoniox-backend
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tags
        id: vars
        run: |
          set -euo pipefail
          echo "sha_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version_tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "raw_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push frontend (commit tag)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.sha_tag }}
          provenance: false

      - name: Build and push backend (commit tag)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.sha_tag }}
          provenance: false

      - name: Publish latest tags (main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${FRONTEND_IMAGE}:latest" \
            "${FRONTEND_IMAGE}:${{ steps.vars.outputs.sha_tag }}"
          docker buildx imagetools create \
            -t "${BACKEND_IMAGE}:latest" \
            "${BACKEND_IMAGE}:${{ steps.vars.outputs.sha_tag }}"

      - name: Publish release tags (v*)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${FRONTEND_IMAGE}:${{ steps.vars.outputs.version_tag }}" \
            -t "${FRONTEND_IMAGE}:${{ steps.vars.outputs.raw_tag }}" \
            "${FRONTEND_IMAGE}:${{ steps.vars.outputs.sha_tag }}"
          docker buildx imagetools create \
            -t "${BACKEND_IMAGE}:${{ steps.vars.outputs.version_tag }}" \
            -t "${BACKEND_IMAGE}:${{ steps.vars.outputs.raw_tag }}" \
            "${BACKEND_IMAGE}:${{ steps.vars.outputs.sha_tag }}"
