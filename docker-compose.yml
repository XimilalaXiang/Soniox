services:
  backend:
    image: ghcr.io/ximilalaxiang/opensoniox-backend:${SONIOX_IMAGE_TAG:-latest}
    container_name: opensoniox-backend
    restart: unless-stopped
    expose:
      - "17661"
    volumes:
      - ./backend/data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite+aiosqlite:///./data/transcriptions.db
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env or environment}
      - ACCESS_PASSWORD=${ACCESS_PASSWORD:-}
    networks:
      - opensoniox-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:17661/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ghcr.io/ximilalaxiang/opensoniox-frontend:${SONIOX_IMAGE_TAG:-latest}
    container_name: opensoniox-frontend
    restart: unless-stopped
    ports:
      - "17881:80"
    depends_on:
      - backend
    networks:
      - opensoniox-network

networks:
  opensoniox-network:
    driver: bridge
